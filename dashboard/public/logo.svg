<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Hard black offset shadow circle -->
  <circle cx="272" cy="272" r="215" fill="#1A1A1A" />
  
  <!-- Main Teal Circle -->
  <circle cx="248" cy="248" r="215" fill="#23A094" stroke="#1A1A1A" stroke-width="20" />

  <!-- Shackle Shadow Offset (black underlayer) -->
  <path d="M 191 240 V 160 C 191 90, 315 90, 315 160 V 240" fill="none" stroke="#1A1A1A" stroke-width="56" />

  <!-- Shackle Main (white inside with black outline) -->
  <path d="M 175 240 V 144 C 175 90, 321 90, 321 144 V 240" fill="none" stroke="#1A1A1A" stroke-width="40" />
  <path d="M 175 240 V 144 C 175 90, 321 90, 321 144 V 240" fill="none" stroke="#FFFFFF" stroke-width="20" />

  <!-- Lock body shadow -->
  <rect x="146" y="246" width="220" height="150" rx="16" fill="#1A1A1A" />
  
  <!-- Lock body main -->
  <rect x="130" y="230" width="220" height="150" rx="16" fill="#FF90E8" stroke="#1A1A1A" stroke-width="20" stroke-linejoin="round" />
  
  <!-- Lock body inner border line (optional but nice for brutalism) -->
  <rect x="142" y="242" width="196" height="126" rx="8" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.8" />
  
  <!-- Keyhole circular part -->
  <circle cx="240" cy="285" r="16" fill="#1A1A1A" />
  
  <!-- Keyhole bottom part -->
  <path d="M 230 285 L 222 325 H 258 L 250 285 Z" fill="#1A1A1A" />
  
  <!-- Keyhole outline fix -->
  <path d="M 240 285 Z" stroke="#1A1A1A" stroke-width="1" />

  <!-- Decorative pluses and stars in the background -->
  <!-- Plus 1 top left -->
  <path d="M 85 130 V 160 M 70 145 H 100" stroke="#1A1A1A" stroke-width="12" stroke-linecap="square" />
  
  <!-- Plus 2 bottom right -->
  <path d="M 405 350 V 380 M 390 365 H 420" stroke="#1A1A1A" stroke-width="12" stroke-linecap="square" />
  
  <!-- Star shape top right -->
  <path d="M 370 140 L 400 170 M 370 170 L 400 140" stroke="#1A1A1A" stroke-width="12" stroke-linecap="square" />
</svg>
